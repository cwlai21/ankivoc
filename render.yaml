services:
  - type: web
    name: ankivocab
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ankivocab-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.0"

databases:
  - name: ankivocab-db
    databaseName: ankivocab
    user: ankiuser
    plan: free
